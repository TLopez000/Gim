<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIMNASTIC - Panel de Inscripciones</title>
    <!-- Hojas de estilo locales -->
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <!-- Iconos Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #121212; font-family: sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column;">

    <!-- BARRA DE NAVEGACIÓN -->
    <div class="w3-bar w3-black w3-border-bottom w3-border-dark-grey" style="height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px;">
        <span class="w3-text-red" style="font-size: 1.2em; font-weight: bold; letter-spacing: 1px;">GIMNASTIC</span>
        <!-- Botón para volver al Login -->
        <a href="/" class="w3-button w3-round w3-hover-red" style="color: #ccc; font-weight: bold; text-decoration: none; font-size: 0.9em; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="w3-container w3-padding-48" style="flex: 1; display: flex; justify-content: center; align-items: center;">
        
        <!-- Tarjeta del Formulario (Ancho máximo controlado para PC y Mobile) -->
        <div class="w3-mobile" style="width: 100%; max-width: 450px;">
            <div class="vault-card w3-padding-large" style="background-color: #1e1e1e; border-radius: 12px; border: 1px solid #2a2a2a; box-shadow: 0 8px 24px rgba(0,0,0,0.6);">
                
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px;">
                    <i class="fas fa-user-plus w3-text-red w3-xlarge"></i>
                    <h3 class="w3-text-white" style="margin: 0; font-weight: 600; letter-spacing: 0.5px;">Inscribir Alumno</h3>
                </div>

                <form id="uploadForm" style="display: flex; flex-direction: column; gap: 16px;">
                    
                    <!-- Campo: Nombre -->
                    <div>
                        <label class="w3-text-grey" style="font-size: 0.85em; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Nombre Completo</label>
                        <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="alumn_name" required style="border-color: #444 !important; height: 42px; margin-top: 5px; padding: 8px 12px;">
                    </div>
                    
                    <!-- Campo: Edad -->
                    <div>
                        <label class="w3-text-grey" style="font-size: 0.85em; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Edad (1-50)</label>
                        <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="number" id="alumn_age" min="1" max="50" required style="border-color: #444 !important; height: 42px; margin-top: 5px; padding: 8px 12px;">
                    </div>

                    <!-- Campo: Teléfono -->
                    <div>
                        <label class="w3-text-grey" style="font-size: 0.85em; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Teléfono de Contacto</label>
                        <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="tel" id="phone" required style="border-color: #444 !important; height: 42px; margin-top: 5px; padding: 8px 12px;">
                    </div>

                    <!-- Campo: Actividad -->
                    <div>
                        <label class="w3-text-grey" style="font-size: 0.85em; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">Actividad</label>
                        <select class="w3-input w3-border w3-round w3-text-white" id="alumn_activity" required style="background-color: #2b2b2b; border-color: #444 !important; height: 42px; margin-top: 5px; padding: 8px 12px; cursor: pointer;">
                            <option value="" disabled selected hidden>Seleccionar actividad</option>
                            <option value="Gimnasia">Gimnasia Artística</option>
                            <option value="Futbol">Fútbol</option>
                            <option value="Atletismo">Atletismo</option>
                            <option value="Otra">Otra</option>
                        </select>
                    </div>

                    <!-- Botón de Envío -->
                    <button type="submit" class="w3-button w3-red w3-block w3-round-large" style="height: 48px; font-weight: bold; font-size: 1em; letter-spacing: 1px; margin-top: 10px; transition: 0.2s; box-shadow: 0 4px 12px rgba(255, 77, 77, 0.2);">
                        CARGAR ALUMNO
                    </button>
                    
                </form>
            </div>
        </div>
        
    </div>

    <!-- SCRIPTS DE LA APLICACIÓN -->
    <script src="../js/services/apiService.js"></script>
    <script src="../js/components/uiHandlers.js"></script>
    <script src="../js/utils/authHelper.js"></script>
    <script src="../js/frontControllers/inscriptFrontController.js"></script>
</body>
</html>
