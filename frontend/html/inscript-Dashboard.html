<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GIMNASTIC - Panel de Inscripciones</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>
<body>

<div class="w3-bar w3-black w3-border-bottom w3-border-dark-grey">
    <span class="w3-bar-item w3-text-red"><b>GIMNASTIC</b></span>
</div>

<div class="w3-container w3-padding-32">
    <div class="w3-row-padding">
        
        <div class="w3-col l4 m5 s12">
            <div class="w3-card-4 vault-card w3-padding w3-round">
                <h3 class="w3-text-red">Inscribir Alumno</h3>
                <form id="uploadForm">
                    <label>Nombre</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="alumn_name" required>
                    
                    <label class="w3-margin-top">Edad (1-50)</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="number" id="alumn_age" min="1" max="50" required>

                    <label class="w3-margin-top">Teléfono</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="tel" id="phone" required>

                    <label>Grupo de clases</label>
                        <select class="w3-input w3-border w3-round w3-text-white" id="alumn_group" required style="background-color: #333;">
                          <option value="">Seleccionar profe</option>
                          <option value="Ludmila">Ludmila</option>
                          <option value="Messi">Messi</option>
                        </select>
                        
                    <label class="w3-margin-top">Nivel</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="alumn_level" placeholder="1..10" required>

                    <label class="w3-margin-top">Estado Mensual</label>
                    <select class="w3-input w3-border w3-round w3-text-white" id="pay_state" required style="background-color: #333;">
                        <option value="">Seleccionar estado</option>
                        <option value="paid">Pago</option>
                        <option value="unpaid">En deuda</option>
                    </select>

                    <button type="submit" class="w3-button w3-red w3-block w3-round-large w3-margin-top">
                        <b>CARGAR</b>
                    </button>
                </form>
            </div>
        </div>
</div>

<script src="../js/services/apiService.js"></script>
<script src="../js/components/uiHandlers.js"></script>
<script src="../js/utils/authHelper.js"></script>
<script src="../js/frontControllers/alumnFrontController.js"></script>
</body>
</html>
