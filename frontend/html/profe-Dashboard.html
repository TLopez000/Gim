<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GIMNASTIC - Panel de Profesores</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>
<body>

<div class="w3-bar w3-black w3-border-bottom w3-border-dark-grey">
    <span class="w3-bar-item w3-text-yellow"><b>GIMNASTIC</b></span>
    <button class="w3-bar-item w3-button w3-right btn-logout">Salir</button>
</div>

<div class="w3-container w3-padding-32">
    <div class="w3-row-padding">
        
        <div class="w3-col l4 m5 s12">
            <div class="w3-card-4 vault-card w3-padding w3-round">
                <h3 class="w3-text-yellow">Subir Nuevo Alumno</h3>
                <form id="uploadForm">
                    <label>Nombre</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="alumn_name" required>
                    
                    <label class="w3-margin-top">Edad (1-60)</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="number" id="alumn_age" min="1" max="60" required>

                    <label class="w3-margin-top">Teléfono</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="tel" id="phone" required>

                    <label class="w3-margin-top">Grupo de clases</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="alumn_group" placeholder="Profesor" required>

                    <label class="w3-margin-top">Nivel</label>
                    <input class="w3-input w3-border w3-round w3-transparent w3-text-white" type="text" id="alumn_level" placeholder="Ej: Básico" required>

                    <label class="w3-margin-top">Estado Mensual</label>
                    <select class="w3-input w3-border w3-round w3-text-white" id="pay_state" required style="background-color: #333;">
                        <option value="">Seleccionar estado</option>
                        <option value="paid">Pago</option>
                        <option value="unpaid">En deuda</option>
                    </select>

                    <button type="submit" class="w3-button w3-yellow w3-block w3-round-large w3-margin-top">
                        <b>CARGAR</b>
                    </button>
                </form>
            </div>
        </div>

        <div class="w3-col l8 m7 s12">
            <h3 class="w3-text-white">Mi listado</h3>
            <div class="w3-responsive">
                <table class="w3-table w3-striped w3-bordered vault-card">
                    <thead>
                        <tr class="w3-yellow">
                            <th>Nombre</th>
                            <th>Edad</th>
                            <th>Grupo de clases</th>
                            <th>Nivel</th>
                            <th>Teléfono</th>
                            <th>Estado Mensual</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="alumnsTableBody">
                        </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="../js/services/apiService.js"></script>
<script src="../js/components/uiHandlers.js"></script>
<script src="../js/utils/authHelper.js"></script>
<script src="../js/frontControllers/alumnFrontController.js"></script>
</body>
</html>
