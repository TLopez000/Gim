<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GIMNASTIC - Panel de Profesores</title>
    <link rel="stylesheet" href="../css/w3.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
</head>
<body>

<div class="w3-bar w3-black w3-border-bottom w3-border-dark-grey">
    <span class="w3-bar-item w3-text-red"><b>GIMNASTIC</b></span>
    <button class="w3-bar-item w3-button w3-right btn-logout">Salir</button>
</div>

<div class="w3-container w3- w3-padding-32">
        
            <div class="w3-col l4 m5 s12">
                <div class="w3-card-4 vault-card w3-padding w3-round">
                    <h3 class="w3-text-red">Buscar</h3>
                    <form id="searchForm">
                        <label>Grupo de clases</label>
                        <select class="w3-input w3-border w3-round w3-text-white" id="selectGroup" style="background-color: #333;">
                          <option value="all">Seleccionar profe</option>
                          <option value="Ludmila">Ludmila</option>
                          <option value="Messi">Messi</option>
                        </select>
                        <label>Nivel</label>
                         <select id="selectLevel" class="w3-input w3-border w3-round">
                             <option value=0 selected>Todos</option>
                             <option value=1>1</option>
                             <option value=2>2</option>
                             <option value=3>3</option>
                             <option value=4>4</option>
                             <option value=5>5</option>
                             <option value=6>6</option>
                             <option value=7>7</option>
                             <option value=8>8</option>
                             <option value=9>9</option>
                             <option value=10>10</option>
                        </select> 
                        <button type="submit" class="w3-button w3-red w3-block w3-round-large w3-margin-top">
                            <b>BUSCAR</b>
                        </button>
                        <button type="button" id="btnClearFilter" class="w3-button w3-red w3-block w3-round-large w3-margin-top">
                            <b>BORRAR FILTRO</b>
                        </button>
                    </form>
                </div>
           </div>

        <div class="w3-col l8 m7 s12">
            <h3 class="w3-text-white">Mi listado</h3>
            <div class="w3-responsive">
                <table class="w3-table w3-striped w3-bordered vault-card">
                    <thead>
                        <tr class="w3-red w3-text-white">
                            <th>Nombre</th>
                            <th>Edad</th>
                            <th>Grupo de clases</th>
                            <th>Nivel</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="alumnsTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="../js/services/apiService.js"></script>
<script src="../js/components/uiHandlers.js"></script>
<script src="../js/utils/authHelper.js"></script>
<script src="../js/frontControllers/alumnFrontController.js"></script>
</body>
</html>
